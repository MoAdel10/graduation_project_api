version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: aqar_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: RealEstateDB
    ports:
      - "33066:3306"
    volumes:
      - aqar_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-padmin"]
      timeout: 5s
      retries: 10
      interval: 10s
      start_period: 30s

  aqar-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: aqar-api:v1.0
    container_name: aqar_api_main
    ports:
      - "8000:8000"
    command: ["npm", "run", "dev"]
    env_file: .env.test
    environment:
      - DB_HOST=db
      - DB_PORT=3306
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/test-db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy  # Wait for DB to be healthy, not just started
    volumes:
      - aqar_uploads:/app/uploads
    restart: unless-stopped
    
  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    image: aqar-api:v1.0
    container_name: aqar_sentinel
    command: ["npm","run","watch"]
    env_file: .env.test
    depends_on:
      db:
        condition: service_healthy  # Also wait for DB
      aqar-api:
        condition: service_started

volumes:
  aqar_db_data:
  aqar_uploads: